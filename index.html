.gift-lid {
  top: 0;
  height: 92px;
  background-position: 0 0;
  transform-origin: 50% 85%;
  z-index: 3;
}

.gift-body {
  top: 92px;
  height: 128px;
  background-position: 0 -92px;
  z-index: 2;
}

.flower-img {
  position: absolute;
  left: 50%;
  bottom: 65px;
  width: 165px;
  transform: translateX(-50%) translateY(140px) scale(0.9);
  opacity: 0;
  z-index: 1;
}

.open-btn {
  position: absolute;
  left: 50%;
  top: 530px;
  transform: translateX(-50%);
  border: none;
  background: #d6336c;
  color: white;
  font-size: 18px;
  font-weight: 800;
  padding: 15px 38px;
  border-radius: 999px;
  box-shadow: 0 10px 24px rgba(214, 51, 108, 0.28);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.hint {
  position: absolute;
  top: 586px;
  width: 100%;
  font-size: 14px;
  color: #777;
}

.open .open-btn,
.open .hint {
  opacity: 0;
  pointer-events: none;
  transition: 0.4s;
}

.open .gift-wrap {
  animation:
    giftShake 0.55s ease-in-out,
    giftFade 1.2s 2.45s ease forwards;
}

.open .gift-lid {
  animation: lidOpen 1.1s 0.55s cubic-bezier(.2,.9,.25,1) forwards;
}

.open .flower-img {
  animation: flowerUpDown 2.2s 1.15s cubic-bezier(.2,.9,.25,1) forwards;
}

.open .message {
  animation: messageShow 1s 3s ease forwards;
}

@keyframes giftShake {
  0%, 100% { transform: translateX(-50%) rotate(0deg); }
  25% { transform: translateX(-50%) rotate(-4deg); }
  50% { transform: translateX(-50%) rotate(4deg); }
  75% { transform: translateX(-50%) rotate(-2deg); }
}

@keyframes lidOpen {
  0% {
    transform: translateY(0) rotate(0deg) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-92px) rotate(-18deg) scale(0.96);
    opacity: 0.25;
  }
}

@keyframes flowerUpDown {
  0% {
    opacity: 0;
    transform: translateX(-50%) translateY(140px) scale(0.9);
  }
  55% {
    opacity: 1;
    transform: translateX(-50%) translateY(-95px) scale(1.04);
  }
  100% {
    opacity: 1;
    transform: translateX(-50%) translateY(-48px) scale(1);
  }
}

@keyframes giftFade {
  to {
    transform: translateX(-50%) translateY(75px) scale(0.88);
    opacity: 0;
  }
}

@keyframes messageShow {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>
